name: Linux GUI

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install desktop environment
        run: |
          sudo apt update

          sudo apt install -y \
            xfce4 xfce4-goodies \
            tightvncserver \
            wget curl \
            dbus-x11

      # =========================
      # VNC SETUP
      # =========================

      - name: Setup VNC
        run: |
          mkdir -p ~/.vnc

          echo "123456" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/bash
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          startxfce4 &
          EOF

          chmod +x ~/.vnc/xstartup

      - name: Start VNC server
        run: |
          vncserver :1 -geometry 1280x720 -depth 24

      # =========================
      # INSTALL PLAYIT
      # =========================

      - name: Install playit.gg
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "deb https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit.list

          sudo apt update
          sudo apt install -y playit

      # =========================
      # FIX PERMISSIONS + START PLAYIT
      # =========================

      - name: Start playit tunnel (FIXED)
        run: |
          # FIX: bypass IPC permission issue safely in CI
          sudo playit > playit.log 2>&1 &

          sleep 10

          echo "PLAYIT LOG:"
          cat playit.log || true

      # =========================
      # KEEP SESSION ALIVE
      # =========================

      - name: Keep running
        run: |
          echo "VNC + playit running..."
          sleep 21600
