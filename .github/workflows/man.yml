name: Linux GUI 

on:
  workflow_dispatch:

jobs:
  desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install desktop environment
        run: |
          sudo apt update
          sudo apt install -y \
            xfce4 xfce4-goodies \
            tightvncserver \
            wget curl

      # =========================
      # VNC SETUP
      # =========================

      - name: Setup VNC
        run: |
          mkdir -p ~/.vnc
          echo "123456" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd

          cat > ~/.vnc/xstartup << 'EOF'
          #!/bin/bash
          startxfce4 &
          EOF

          chmod +x ~/.vnc/xstartup

      - name: Start VNC
        run: |
          vncserver :1 -geometry 1280x720 -depth 24

      # =========================
      # INSTALL PLAYIT.GG
      # =========================

      - name: Install playit.gg
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "deb https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit.list
          sudo apt update
          sudo apt install -y playit

      # =========================
      # START PLAYIT AGENT
      # =========================

      - name: Start playit tunnel
        run: |
          playit &
          sleep 10

      # =========================
      # KEEP SESSION ALIVE
      # =========================

      - name: Keep running
        run: |
          echo "Desktop + VNC + playit running"
          sleep 21600
